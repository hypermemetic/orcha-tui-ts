org = "hypermemetic"
forges = [
    "codeberg",
    "github",
]
visibility = "public"

[ci]
skip_validate = false

[[ci.runners]]
type = "local"
build = [
    "npm",
    "run",
    "build",
]
test = [
    "npm",
    "test",
]
timeout_secs = 300

[[ci.runners]]
type = "docker"
build = [
    "sh",
    "-c",
    "npm install && npm run build",
]
test = [
    "npm",
    "test",
]
image = "node:lts"
timeout_secs = 600
